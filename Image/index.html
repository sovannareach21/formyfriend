<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For all My Friends ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- Loading Screen --- */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0b14;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease;
        }

        .loader-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .loader-text {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4b5c, #ff6b8b);
            box-shadow: 0 0 10px #ff4b5c;
            animation: fillProgress 3s forwards cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            20% { width: 15%; }
            50% { width: 65%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        /* --- Main Animation Space --- */
        #space {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 800px;
            display: none;
        }

        .floating-item {
            position: absolute;
            pointer-events: none;
            will-change: transform, opacity;
        }

        .neon-text {
            color: #fff;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #3498db,
                0 0 20px #3498db,
                0 0 40px #2980b9;
            font-size: 2rem;
        }

        .heart {
            font-size: 2.5rem;
            color: #ff2a4b;
            filter: drop-shadow(0 0 10px #ff2a4b);
        }

        .photo-card {
            width: 120px;
            height: 150px;
            border: 4px solid #fff;
            background-color: #222;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            overflow: hidden;
            border-radius: 4px;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Keep the raw HTML source photos hidden on screen */
        #photo-gallery {
            display: none;
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="loader-box">
            <div class="loader-text">Authenticating...</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <div id="space"></div>

    <div id="photo-gallery">
        <img src="Image/123.jpg" alt="Our Photo 1">
        <img src="Image/123.jpg" alt="Our Photo 2">
        <img src="Image/123.jpg" alt="Our Photo 3">
        </div>

    <script>
        const loader = document.getElementById('loader-container');
        const space = document.getElementById('space');
        
        // Automatically grab all image sources from your HTML tags above
        const htmlImages = document.querySelectorAll('#photo-gallery img');
        const imageUrls = Array.from(htmlImages).map(img => img.src);

        // Fallback placeholder if you haven't added your photos yet
        const defaultImages = [
            'https://picsum.photos/200/300?random=1',
            'https://picsum.photos/200/300?random=2'
        ];
        const finalImages = imageUrls.length > 0 ? imageUrls : defaultImages;

        // Transition from loader to main animation
        setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                space.style.display = 'block';
                startFloatingAnimation();
            }, 1000);
        }, 3000);

        function startFloatingAnimation() {
            function createItem() {
                const types = ['text', 'heart', 'photo'];
                const randomType = types[Math.floor(Math.random() * 10) < 6 ? 0 : (Math.random() * 10 < 8 ? 1 : 2)];
                
                const element = document.createElement('div');
                element.classList.add('floating-item');

                if (randomType === 'text') {
                    element.classList.add('neon-text');
                    element.innerText = 'I love you all my friends ❤️';
                    element.style.fontSize = `${Math.random() * (2.5 - 1.2) + 1.2}rem`;
                } else if (randomType === 'heart') {
                    element.classList.add('heart');
                    element.innerText = '❤️';
                } else if (randomType === 'photo') {
                    element.classList.add('photo-card');
                    const img = document.createElement('img');
                    img.src = finalImages[Math.floor(Math.random() * finalImages.length)];
                    element.appendChild(img);
                    element.style.transform += ` rotate(${Math.random() * 30 - 15}deg)`;
                }

                const startX = Math.random() * window.innerWidth;
                const startY = Math.random() * window.innerHeight;
                
                space.appendChild(element);

                let progress = 0;
                const speed = Math.random() * 0.003 + 0.002;
                const depthMax = 800;

                function animate() {
                    progress += speed;
                    if (progress > 1) {
                        element.remove();
                    } else {
                        const currentZ = -depthMax + (progress * (depthMax + 400));
                        const opacity = progress < 0.2 ? progress / 0.2 : (progress > 0.8 ? (1 - progress) / 0.2 : 1);
                        
                        element.style.left = `${startX}px`;
                        element.style.top = `${startY}px`;
                        element.style.transform = `translate3d(-50%, -50%, ${currentZ}px)`;
                        element.style.opacity = opacity;

                        requestAnimationFrame(animate);
                    }
                }
                requestAnimationFrame(animate);
            }

            setInterval(createItem, 300);
        }
    </script>
</body>
</html>
